name: pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: configure_pages
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true
      - name: Pages unavailable
        if: steps.configure_pages.outcome == 'failure'
        run: |
          echo "GitHub Pages is not available for this repository plan."
          echo "Skipping deployment; enable Pages support in repository settings to publish the static site."
      - uses: actions/upload-pages-artifact@v3
        if: steps.configure_pages.outcome == 'success'
        with:
          path: website
      - id: deployment
        if: steps.configure_pages.outcome == 'success'
        uses: actions/deploy-pages@v4