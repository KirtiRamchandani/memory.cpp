name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: memory-linux-x86_64
            bin_path: target/release/memory
            archive_name: memory-linux-x86_64.tar.gz
          - os: macos-latest
            artifact_name: memory-macos-x86_64
            bin_path: target/release/memory
            archive_name: memory-macos-x86_64.tar.gz
          - os: windows-latest
            artifact_name: memory-windows-x86_64
            bin_path: target/release/memory.exe
            archive_name: memory-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release -p memory-cli
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bin_path }}" dist/memory
          tar -czf "${{ matrix.archive_name }}" -C dist memory
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "${{ matrix.bin_path }}" dist\memory.exe
          Compress-Archive -Path dist\memory.exe -DestinationPath "${{ matrix.archive_name }}" -Force
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/**
          generate_release_notes: true
