<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>memory.cpp dashboard sample</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; background: #0b1020; color: #eef4ff; margin: 0; padding: 32px; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 960px; }
      .card { background: #121a2e; border: 1px solid #25314a; border-radius: 12px; padding: 16px; }
      strong { color: #42d392; }
    </style>
  </head>
  <body>
    <h1>memory.cpp dashboard sample</h1>
    <p>Static preview of the HTML report shape generated by <code>memory wow</code> and <code>memory dashboard --html</code>.</p>
    <div class="grid">
      <div class="card"><span>Compiled context</span><h2>1,420 tokens</h2></div>
      <div class="card"><span>Raw context</span><h2>84,000 tokens</h2></div>
      <div class="card"><span>Agent readiness</span><h2>96 / 100</h2></div>
    </div>
  </body>
</html>
